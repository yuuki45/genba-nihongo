name: nihongo
description: Nihongo - 外国人技能実習生向け日本語学習アプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ルーティング
  go_router: ^14.2.0

  # データ管理
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # 音声
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.2
  record: ^6.1.2

  # UI/UX
  lottie: ^3.1.2
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0

  # 通知
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.3

  # アプリ内課金
  in_app_purchase: ^3.2.0

  # ユーティリティ
  intl: ^0.20.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # コード生成
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.1

  # Linter
  flutter_lints: ^4.0.0

  # テスト
  mockito: ^5.4.4
  sqflite_common_ffi: ^2.3.3

  # アイコン生成
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/data/

  fonts:
    # 見出し用: 丸ゴシック（現場標識の柔らかさ）
    - family: ZenMaruGothic
      fonts:
        - asset: fonts/ZenMaruGothic-Bold.ttf
          weight: 700
        - asset: fonts/ZenMaruGothic-Black.ttf
          weight: 900
    # 本文用: ユニバーサルデザインフォント（非母語話者の可読性）
    - family: BIZUDPGothic
      fonts:
        - asset: fonts/BIZUDPGothic-Regular.ttf
          weight: 400
        - asset: fonts/BIZUDPGothic-Bold.ttf
          weight: 700

# アイコン生成設定
flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/images/app_icon.png"
  # iOSのアイコンを角丸にしない（iOSが自動で角丸にする）
  remove_alpha_ios: true
